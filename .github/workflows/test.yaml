name: Automated Tests

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '0 15 * * 4'  # Thursday 3 PM

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Connect to Outline VPN
        env:
          OUTLINE_KEY: ${{ secrets.OUTLINE_ACCESS_KEY }}
        run: |
          sudo apt-get install -y shadowsocks-libev 2>/dev/null
          python3 <<'EOF'
          import base64, re, json, os

          key = os.environ['OUTLINE_KEY'].split('?')[0]
          body = key[5:]

          def safe_decode(b):
              try:
                  return b.decode('utf-8')
              except UnicodeDecodeError:
                  return b.decode('latin-1')

          def add_padding(s):
              return s + '=' * (4 - len(s) % 4)

          m = re.match(r'([A-Za-z0-9+/=_-]+)@([^:]+):(\d+)$', body)
          if m:
              userinfo_b64, host, port = m.groups()
              userinfo = safe_decode(base64.urlsafe_b64decode(add_padding(userinfo_b64)))
              method, password = userinfo.split(':', 1)
          else:
              decoded = safe_decode(base64.urlsafe_b64decode(add_padding(body)))
              m2 = re.match(r'([^:]+):(.+)@([^:]+):(\d+)$', decoded)
              method, password, host, port = m2.groups()

          cfg = {"server": host, "server_port": int(port),
                 "local_address": "127.0.0.1", "local_port": 1080,
                 "password": password, "method": method, "timeout": 60}
          with open('/tmp/ss.json', 'w') as f:
              json.dump(cfg, f)
          print(f"Parsed: {method} @ {host}:{port}")
          EOF
          ss-local -c /tmp/ss.json -u &
          sleep 3
          echo "SOCKS5 proxy running on 127.0.0.1:1080"

      - name: Verify connectivity through VPN
        run: |
          curl --socks5 127.0.0.1:1080 --max-time 30 -o /dev/null \
            -w 'HTTP status: %{http_code}\n' \
            'https://storefront-consumer-frontend-store-front-dev.skynodes.dev/'

      - name: Run Maven tests
        env:
          USE_PROXY: "true"
        run: mvn test "-Dtestng.suites=testNG.xml"

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: 'target/surefire-reports/'
          reporter: 'java-junit'
